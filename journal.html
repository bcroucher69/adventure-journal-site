<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal | AD's Adventure Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="logo" href="index.html">🌟 AD's World</a>
        <nav class="nav">
          <a href="index.html">Home</a>
          <a href="journal.html" class="active">Journal</a>
          <a href="gallery.html">Gallery</a>
          <a href="voice.html">Voice Notes</a>
        </nav>
      </div>
    </header>

    <main class="container page-content">
      <section class="page-title">
        <span class="eyebrow">Journal</span>
        <h1>Write down cool thoughts and everyday discoveries.</h1>
      </section>

      <section class="card form-card">
        <h2>New Entry</h2>
        <div class="grid-two">
          <div>
            <label for="title">Title</label>
            <input id="title" type="text" placeholder="Today at soccer..." />
          </div>
          <div>
            <label for="category">Category</label>
            <select id="category">
              <option>Observation</option>
              <option>School</option>
              <option>Sports</option>
              <option>Family</option>
              <option>Fun</option>
            </select>
          </div>
        </div>

        <label for="content">What happened?</label>
        <textarea id="content" rows="6" placeholder="Write something cool you noticed, learned, or felt today..."></textarea>

        <div class="action-row">
          <button class="btn btn-primary" id="saveEntryBtn">Save Entry</button>
          <button class="btn btn-secondary" id="clearEntriesBtn">Clear All Entries</button>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Saved Entries</h2>
          <span class="pill" id="entryCount">0 entries</span>
        </div>
        <div id="entries" class="stack-list empty-state">
          <p>No journal entries yet. Add the first one above.</p>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
